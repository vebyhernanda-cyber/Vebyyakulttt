
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>selamat hari raya sayang nya yakuttt💖</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 400px;
      z-index: 2;
      animation: fadeIn 2s ease;
    }

    h1 { color: #ff4d6d; }
    p { font-size: 16px; line-height: 1.6; }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #e63e5c; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);} 
      to { opacity: 1; transform: translateY(0);} 
    }

    .heart {
      position: absolute;
      top: -10px;
      color: #ff4d6d;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>Selamat Hari Raya 💕</h1>

  <p id="message">
    Mohon Maaf lahir dan batin ya sayang akuuuu ❤️<br><br>
    Semoga di hari tahun ni, sayanhg dapat banyak thr😆 dan semogaaa sayanggg dan akuuuu... 
    kita selalu diberikan kebahagiaan,
    hubungan kita semakin kuat,
    dan cinta kita tidak pernah pudar , asikkkk😆😗💖
  </p>

  <button onclick="changeMessage()">Klik untuk pesan spesial 💌</button>
</div>

<script>
function changeMessage() {
  document.getElementById('message').innerHTML = 
    "Terima kasih sudah selalu ada untuk aku cintakuuu💗<br><br>" +
    "Aku bersyukur banget punya kamu muahh muahhh babyyy😘🤍<br>" +
    "Semoga kita selalu bersama, hari ini dan seterusnya 💞";
}

function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML = '❤';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.animationDuration = (2 + Math.random() * 3) + 's';
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
